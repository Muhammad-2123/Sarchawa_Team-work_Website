<!DOCTYPE html>
<html lang="ku">
<head>
  <meta charset="UTF-8">
  <title>سەرچاوە - Kurdish Resources</title>
  <link href="https://fonts.googleapis.com/css2?family=Scheherazade+New&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="frontCode.js" defer></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <div class="container">
    <!-- Top Bar -->
    <header class="top-bar">
      <div class="left-buttons">
        <button><i class="fa-solid fa-circle-info"></i></button>
        <button><i class="fa-solid fa-plus"></i></button>
      </div>
      <div class="right-title">
        <h1><strong>سەرچاوە</strong></h1>
        <p>سەرچاوە (Sarchawa.com) لێرەوە سەرچاوە کوردیەکان بدۆزەرەوە یاخود سەرچاوەکەی خۆت دابنێ</p>
      </div>
    </header>

    <!-- Main Content -->
    <main class="content">
      <aside class="filter">
        <button id="filter-btn">فیلتەر کردن ▼</button>
        <ul id="filter-list" class="hidden">
          <li>#فیلتەر١</li>
          <li>#فیلتەر٢</li>
          <li>#فیلتەر٣</li>
        </ul>
      </aside>
      <section class="resources">
        <h2>سەرچاوە کوردییەکان</h2>
        <label for="resource-name">ناوی سەرچاوە</label>
        <input type="text" id="resource-name" placeholder="ناوی سەرچاوەکە بنووسە...">
        <div class="filters">
          <span>#فیلتەر١</span>
          <span>#فیلتەر٢</span>
          <span>#فیلتەر٣</span>
        </div>
      </section>
    </main>

    <!-- Footer -->
    <footer>
      © 2026 Sarchawa Project – Kurdish Resources
    </footer>
  </div>
</body>
</html>
